name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: '8.1'
            symfony-version: '^6.4'
          - php-version: '8.2'
            symfony-version: '^7.4'
          - php-version: '8.3'
            symfony-version: '^7.4'
          - php-version: '8.4'
            symfony-version: '^8.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          extensions: dom
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund --package-lock=false

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-php-${{ matrix.php-version }}-symfony-${{ matrix.symfony-version }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php-version }}-symfony-${{ matrix.symfony-version }}-composer-

      - name: Configure PHP platform for lane
        run: composer config platform.php ${{ matrix.php-version }}

      - name: Configure Symfony lane
        run: |
          composer require --no-update --dev \
            symfony/phpunit-bridge:${{ matrix.symfony-version }}
          composer require --no-update \
            symfony/asset:${{ matrix.symfony-version }} \
            symfony/console:${{ matrix.symfony-version }} \
            symfony/form:${{ matrix.symfony-version }} \
            symfony/framework-bundle:${{ matrix.symfony-version }} \
            symfony/http-foundation:${{ matrix.symfony-version }} \
            symfony/process:${{ matrix.symfony-version }} \
            symfony/security-core:${{ matrix.symfony-version }} \
            symfony/security-csrf:${{ matrix.symfony-version }} \
            symfony/serializer:${{ matrix.symfony-version }} \
            symfony/yaml:${{ matrix.symfony-version }}

      - name: Update dependencies for lane
        run: composer update --with-all-dependencies --prefer-dist --no-interaction --no-progress

      - name: Run test suite
        run: vendor/bin/simple-phpunit
